server
  {
    listen     80 default_server;
    server_name ~^(?<subdomain>.+)\.stayintel\.com$;

    location ~^\/(?<cc>[^.]+)\.stayintel\.com\/(?<path>.*)$
      {
        resolver 127.0.0.11 ipv6=off;
        proxy_pass http://$cc.stayintel.com/$path?$args;
          proxy_read_timeout 10000s;
        break;
      }

    if ($subdomain = '') {
      set $subdomain 'qa';
    }

    set    $server_root "/stayintel/www";
    root   $server_root;
    index  index.php index.html;

    proxy_intercept_errors on;
    fastcgi_intercept_errors on;

    location /
      {
        try_files $uri $uri/ $uri/index.php /index.php?$args;
      }

    location ~* ^.+\.(php)$
      {
        if (!-f $request_filename)
          {
            return 404;
            break;
          }

        fastcgi_pass                 php-fpm:9000;
        fastcgi_connect_timeout      60;
        fastcgi_send_timeout         600s;
        fastcgi_read_timeout         10000;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 128k;
        fastcgi_busy_buffers_size    128k;
        fastcgi_temp_file_write_size 128k;

        fastcgi_param DOCUMENT_ROOT      $server_root;
        fastcgi_param SCRIPT_FILENAME    $server_root$fastcgi_script_name;
        fastcgi_param PATH_TRANSLATED    $server_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME        $fastcgi_script_name;
        fastcgi_param QUERY_STRING       $query_string;
        fastcgi_param CONTENT_TYPE       $content_type;
        fastcgi_param CONTENT_LENGTH     $content_length;
        fastcgi_param SERVER_ADDR        $server_addr;
        fastcgi_param SERVER_PORT        $server_port;
        fastcgi_param SERVER_PROTOCOL    $server_protocol;
        fastcgi_param GATEWAY_INTERFACE  "CGI/1.1";
        fastcgi_param SERVER_NAME        $server_name;
        fastcgi_param REQUEST_URI        $request_uri;
        fastcgi_param REQUEST_METHOD     $request_method;
        fastcgi_param REMOTE_USER        $remote_user;
        fastcgi_param REMOTE_ADDR        $remote_addr;
        fastcgi_param REMOTE_PORT        $remote_port;
      }

    location ~ \.(hg|git|svn)
      {
        deny all;
      }
  }